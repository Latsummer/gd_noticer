service:
  timezone: "Asia/Shanghai"
  poll_interval_seconds: 600
  window_start: "09:00:00"
  window_end: "22:30:00"
  # 自适应轮询：根据价格波动率动态调整轮询间隔
  adaptive_poll: true
  min_poll_interval_seconds: 180   # 高波动时最短轮询间隔（秒）
  max_poll_interval_seconds: 1200  # 低波动时最长轮询间隔（秒）

gold_api:
  # API 类型：standard（标准行情）或 fusion（融合行情，整合SH金和国际金价）
  api_type: "fusion"
  base_url: "https://sapi.k780.com/"
  gold_id: "1051"
  # 融合行情品种 ID（api_type 为 fusion 时使用，共用 base_url）
  fusion_gold_id: "1301"
  app_key: "${GD_APP_KEY}"
  sign: "${GD_SIGN}"
  id_to_name:
    "1051": 黄金 T+D
    "1301": 融合行情

notify:
  bark_endpoint: "https://api.day.app/push"
  # 多个设备密钥用英文逗号分隔，如：key1,key2,key3
  device_keys: "${DEVICE_KEYS}"
  group: "gold-watch"
  title_prefix: "金价"

strategy:
  dedup_by_uptime: true
  min_change_percent: 0
  max_silent_minutes: 30           # 静默保底：超过 30 分钟无通知则强制推送心跳
  # 智能通知策略
  notify_change_percent: 0.1       # 距上次通知的累计变化 % 阈值（约 ±1 元）
  trend_reversal_count: 3          # 连续同向 N 次后反转视为拐点
  price_history_size: 10           # 价格历史滑动窗口大小
  regular_interval_minutes: 30     # 定期更新间隔（分钟），行情有变化且超过此间隔就推送

reliability:
  http_timeout_seconds: 10
  max_retries: 3
  retry_backoff_seconds: 2
  failure_alert_threshold: 3

state:
  file_path: "./data/state.json"

http_server:
  enable: false
  listen_addr: "127.0.0.1:18080"

log:
  # 日志输出目标：stdout（标准输出）或文件路径（如 ./logs/app.log）
  output: "stdout"
  # 日志级别：debug / info / warn / error
  level: "info"
